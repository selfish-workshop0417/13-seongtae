<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>구독박스 · Subbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0F0F13;
      --card: #1A1A24;
      --card-hover: #222230;
      --border: #2a2a3a;
      --primary: #6366F1;
      --primary-light: #818CF8;
      --success: #22C55E;
      --warning: #F97316;
      --danger: #EF4444;
      --text: #F1F1F5;
      --text-muted: #8B8BA7;
      --radius: 14px;
    }

    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── 헤더 ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(15,15,19,0.85);
      backdrop-filter: blur(12px);
      z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--primary);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .logo-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

    .add-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--primary);
      color: #fff;
      border: none; border-radius: 10px;
      padding: 10px 20px;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .add-btn:hover { background: var(--primary-light); transform: translateY(-1px); }

    /* ── 메인 ── */
    main { max-width: 960px; margin: 0 auto; padding: 40px 24px; }

    /* ── 요약 카드 ── */
    .summary {
      background: linear-gradient(135deg, #1e1e35, #16162a);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    .summary-label { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
    .summary-amount { font-size: 38px; font-weight: 700; letter-spacing: -1px; }
    .summary-amount span { font-size: 20px; font-weight: 500; color: var(--text-muted); margin-left: 4px; }
    .summary-stats { display: flex; gap: 32px; }
    .stat { text-align: center; }
    .stat-num { font-size: 22px; font-weight: 700; }
    .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .urgent-badge {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--danger);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px; font-weight: 600;
      display: none;
    }

    /* ── 필터 탭 ── */
    .filter-tabs {
      display: flex; gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .tab {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab:hover { color: var(--text); border-color: var(--primary); }
    .tab.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* ── 구독 카드 그리드 ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .sub-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .sub-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--primary);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .sub-card:hover { background: var(--card-hover); transform: translateY(-2px); }
    .sub-card:hover::before { opacity: 1; }
    .sub-card.warning { border-color: rgba(249,115,22,0.4); }
    .sub-card.warning::before { background: var(--warning); opacity: 1; }
    .sub-card.danger { border-color: rgba(239,68,68,0.5); }
    .sub-card.danger::before { background: var(--danger); opacity: 1; }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
    .card-icon {
      width: 44px; height: 44px;
      background: rgba(99,102,241,0.15);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .card-badge {
      font-size: 11px; font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(99,102,241,0.15);
      color: var(--primary-light);
    }
    .card-name { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .card-price { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
    .card-price span { font-size: 13px; color: var(--text-muted); font-weight: 400; }
    .card-bottom { display: flex; align-items: center; justify-content: space-between; }
    .card-date { font-size: 12px; color: var(--text-muted); }
    .dday {
      font-size: 12px; font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(99,102,241,0.15);
      color: var(--primary-light);
    }
    .dday.warning { background: rgba(249,115,22,0.15); color: var(--warning); }
    .dday.danger { background: rgba(239,68,68,0.15); color: var(--danger); }

    /* ── 빈 상태 ── */
    .empty {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
      display: none;
    }
    .empty-icon { font-size: 56px; margin-bottom: 16px; }
    .empty h3 { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .empty p { font-size: 14px; line-height: 1.6; }

    /* ── 모달 오버레이 ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .overlay.open { display: flex; }

    .modal {
      background: #1a1a2e;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 440px;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 24px; }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
    input, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--primary); }
    select option { background: #1a1a2e; }

    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }

    .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
    .btn-cancel {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 10px;
      padding: 12px;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }
    .btn-save {
      flex: 2;
      background: var(--primary);
      border: none;
      color: #fff;
      border-radius: 10px;
      padding: 12px;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-save:hover { background: var(--primary-light); }
    .btn-delete {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--danger);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-delete:hover { background: rgba(239,68,68,0.2); }

    /* ── 알림 허용 배너 ── */
    .notif-banner {
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 12px;
      padding: 14px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .notif-banner p { font-size: 13px; color: var(--text-muted); }
    .notif-banner strong { color: var(--text); }
    .btn-notif {
      background: var(--primary);
      border: none;
      color: #fff;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .btn-notif:hover { background: var(--primary-light); }
    .btn-close-banner {
      background: none; border: none;
      color: var(--text-muted); font-size: 18px;
      cursor: pointer; padding: 0 4px;
    }

    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      .summary { padding: 20px; }
      .summary-amount { font-size: 28px; }
      main { padding: 24px 16px; }
    }
  </style>
</head>
<body>

<!-- 헤더 -->
<header>
  <div class="logo">
    <div class="logo-icon">📦</div>
    <div>
      <div class="logo-text">구독박스</div>
      <div class="logo-sub">Subbox</div>
    </div>
  </div>
  <button class="add-btn" onclick="openModal()">
    <span>+</span> 구독 추가
  </button>
</header>

<main>

  <!-- 알림 배너 -->
  <div class="notif-banner" id="notifBanner">
    <p><strong>🔔 알림 설정</strong> — 종료일 3일 전, D-day에 알림을 받아보세요</p>
    <button class="btn-notif" onclick="requestNotif()">알림 허용</button>
    <button class="btn-close-banner" onclick="closeBanner()">✕</button>
  </div>

  <!-- 요약 -->
  <div class="summary">
    <div>
      <div class="summary-label">이번 달 총 구독료</div>
      <div class="summary-amount" id="totalAmount">₩0<span>/ 월</span></div>
    </div>
    <div class="summary-stats">
      <div class="stat">
        <div class="stat-num" id="totalCount">0</div>
        <div class="stat-label">총 구독</div>
      </div>
      <div class="stat">
        <div class="stat-num danger" id="urgentCount">0</div>
        <div class="stat-label">⚠️ 임박</div>
      </div>
    </div>
    <div class="urgent-badge" id="urgentBadge">종료 임박 구독이 있어요!</div>
  </div>

  <!-- 필터 탭 -->
  <div class="filter-tabs" id="filterTabs">
    <button class="tab active" data-cat="전체">전체</button>
    <button class="tab" data-cat="AI툴">🤖 AI툴</button>
    <button class="tab" data-cat="OTT">🎬 OTT</button>
    <button class="tab" data-cat="음악">🎵 음악</button>
    <button class="tab" data-cat="업무툴">💼 업무툴</button>
    <button class="tab" data-cat="기타">📌 기타</button>
  </div>

  <!-- 빈 상태 -->
  <div class="empty" id="emptyState">
    <div class="empty-icon">📭</div>
    <h3>아직 구독이 없어요</h3>
    <p>+ 구독 추가 버튼을 눌러<br>첫 번째 구독을 등록해보세요</p>
  </div>

  <!-- 카드 그리드 -->
  <div class="grid" id="grid"></div>

</main>

<!-- 모달 -->
<div class="overlay" id="overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">구독 추가</div>
    <input type="hidden" id="editId" />

    <div class="form-group">
      <label>서비스 이름</label>
      <input type="text" id="fName" placeholder="예: ChatGPT Plus" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>카테고리</label>
        <select id="fCat">
          <option value="AI툴">🤖 AI툴</option>
          <option value="OTT">🎬 OTT</option>
          <option value="음악">🎵 음악</option>
          <option value="업무툴">💼 업무툴</option>
          <option value="기타">📌 기타</option>
        </select>
      </div>
      <div class="form-group">
        <label>결제 주기</label>
        <select id="fCycle">
          <option value="월간">월간</option>
          <option value="연간">연간</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>구독료 (원)</label>
        <input type="number" id="fPrice" placeholder="예: 20000" />
      </div>
      <div class="form-group">
        <label>종료일 (갱신일)</label>
        <input type="date" id="fDate" />
      </div>
    </div>

    <div class="form-group">
      <label>메모 (선택)</label>
      <input type="text" id="fMemo" placeholder="예: 가족 공유 중" />
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-delete" id="deleteBtn" onclick="deleteSub()" style="display:none">삭제</button>
      <button class="btn-save" onclick="saveSub()">저장</button>
    </div>
  </div>
</div>

<script>
  const ICONS = { AI툴: '🤖', OTT: '🎬', 음악: '🎵', 업무툴: '💼', 기타: '📌' };
  let subs = JSON.parse(localStorage.getItem('subbox') || '[]');
  let currentCat = '전체';

  function save() { localStorage.setItem('subbox', JSON.stringify(subs)); }

  function dDay(dateStr) {
    const diff = Math.ceil((new Date(dateStr) - new Date()) / 86400000);
    return diff;
  }

  function fmt(n) { return n.toLocaleString('ko-KR'); }

  function render() {
    const grid = document.getElementById('grid');
    const empty = document.getElementById('emptyState');
    const filtered = currentCat === '전체' ? subs : subs.filter(s => s.cat === currentCat);

    grid.innerHTML = '';

    if (subs.length === 0) {
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
    }

    // 요약 계산
    const total = subs.reduce((acc, s) => acc + (s.cycle === '연간' ? Math.round(s.price / 12) : s.price), 0);
    const urgent = subs.filter(s => dDay(s.date) <= 7).length;
    document.getElementById('totalAmount').innerHTML = `₩${fmt(total)}<span>/ 월</span>`;
    document.getElementById('totalCount').textContent = subs.length;
    document.getElementById('urgentCount').textContent = urgent;
    if (urgent > 0) document.getElementById('urgentBadge').style.display = 'block';
    else document.getElementById('urgentBadge').style.display = 'none';

    filtered.forEach(s => {
      const d = dDay(s.date);
      let cardClass = '', ddayClass = '', ddayText = '';
      if (d < 0) { ddayText = '종료됨'; ddayClass = 'danger'; cardClass = 'danger'; }
      else if (d === 0) { ddayText = 'D-day'; ddayClass = 'danger'; cardClass = 'danger'; }
      else if (d <= 3) { ddayText = `D-${d}`; ddayClass = 'danger'; cardClass = 'danger'; }
      else if (d <= 7) { ddayText = `D-${d}`; ddayClass = 'warning'; cardClass = 'warning'; }
      else { ddayText = `D-${d}`; }

      const monthlyPrice = s.cycle === '연간' ? Math.round(s.price / 12) : s.price;

      grid.innerHTML += `
        <div class="sub-card ${cardClass}" onclick="openEdit('${s.id}')">
          <div class="card-top">
            <div class="card-icon">${ICONS[s.cat] || '📌'}</div>
            <div class="card-badge">${s.cat}</div>
          </div>
          <div class="card-name">${s.name}</div>
          <div class="card-price">₩${fmt(s.price)}<span>/ ${s.cycle}</span></div>
          <div class="card-bottom">
            <div class="card-date">종료 ${s.date}</div>
            <div class="dday ${ddayClass}">${ddayText}</div>
          </div>
        </div>`;
    });

    scheduleNotifications();
  }

  // 필터 탭
  document.getElementById('filterTabs').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentCat = tab.dataset.cat;
    render();
  });

  // 모달
  function openModal(sub = null) {
    document.getElementById('overlay').classList.add('open');
    document.getElementById('modalTitle').textContent = sub ? '구독 수정' : '구독 추가';
    document.getElementById('deleteBtn').style.display = sub ? 'block' : 'none';
    document.getElementById('editId').value = sub ? sub.id : '';
    document.getElementById('fName').value = sub ? sub.name : '';
    document.getElementById('fCat').value = sub ? sub.cat : 'AI툴';
    document.getElementById('fCycle').value = sub ? sub.cycle : '월간';
    document.getElementById('fPrice').value = sub ? sub.price : '';
    document.getElementById('fDate').value = sub ? sub.date : '';
    document.getElementById('fMemo').value = sub ? sub.memo : '';
  }

  function openEdit(id) {
    openModal(subs.find(s => s.id === id));
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
  }

  function closeModalOutside(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
  }

  function saveSub() {
    const name = document.getElementById('fName').value.trim();
    const price = parseInt(document.getElementById('fPrice').value);
    const date = document.getElementById('fDate').value;
    if (!name || !price || !date) { alert('이름, 금액, 종료일은 필수예요!'); return; }

    const id = document.getElementById('editId').value;
    const sub = {
      id: id || Date.now().toString(),
      name,
      cat: document.getElementById('fCat').value,
      cycle: document.getElementById('fCycle').value,
      price,
      date,
      memo: document.getElementById('fMemo').value.trim()
    };

    if (id) {
      subs = subs.map(s => s.id === id ? sub : s);
    } else {
      subs.push(sub);
    }

    save(); closeModal(); render();
  }

  function deleteSub() {
    if (!confirm('이 구독을 삭제할까요?')) return;
    const id = document.getElementById('editId').value;
    subs = subs.filter(s => s.id !== id);
    save(); closeModal(); render();
  }

  // 알림
  function requestNotif() {
    Notification.requestPermission().then(p => {
      if (p === 'granted') {
        document.getElementById('notifBanner').style.display = 'none';
        localStorage.setItem('notifAllowed', '1');
        alert('알림이 설정됐어요! 종료 3일 전과 D-day에 알려드릴게요 🔔');
        scheduleNotifications();
      }
    });
  }

  function closeBanner() {
    document.getElementById('notifBanner').style.display = 'none';
  }

  function scheduleNotifications() {
    if (Notification.permission !== 'granted') return;
    subs.forEach(s => {
      const d = dDay(s.date);
      if (d === 3) {
        new Notification(`📦 ${s.name} 종료 3일 전!`, {
          body: `${s.date}에 종료돼요. 연장 여부를 확인해보세요.`,
          icon: '📦'
        });
      } else if (d === 0) {
        new Notification(`🚨 ${s.name} 오늘 종료!`, {
          body: '오늘이 종료일이에요. 지금 확인하세요!',
          icon: '📦'
        });
      }
    });
  }

  // 초기화
  if (localStorage.getItem('notifAllowed')) {
    document.getElementById('notifBanner').style.display = 'none';
  }
  if (Notification.permission === 'granted') {
    document.getElementById('notifBanner').style.display = 'none';
  }

  render();
</script>
</body>
</html>
